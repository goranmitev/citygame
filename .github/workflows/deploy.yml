name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}   # Tailscale hostname or IP, e.g. my-server
          username: ${{ secrets.DEPLOY_USER }} # e.g. deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /home/citygame/public_html

      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "dist/*"
          target: /home/citygame/public_html
          strip_components: 1
          rm: true

      - name: Verify deploy
        run: |
          sleep 5
          curl -sf https://citygame.goranmitev.com -o /dev/null && echo "Deploy OK" || echo "Warning: health check failed"
